<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lollipop.cc</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #c026d3;
        }
        
        body {
            font-family: 'Montserrat', system-ui, sans-serif;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0033 100%);
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .page {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(40px);
        }
        
        .page.active {
            opacity: 1;
            pointer-events: all;
            transform: translateX(0);
        }
        
        .logo {
            font-size: clamp(32px, 8vw, 46px);
            font-weight: 900;
            background: linear-gradient(90deg, #c026d3, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            line-height: 1;
        }
        
        .subtitle {
            color: #b3b3b3;
            font-size: clamp(16px, 4.5vw, 20px);
            margin-bottom: 40px;
            font-weight: 500;
        }
        
        .card {
            background: #1f1b2e;
            border-radius: 24px;
            padding: 32px 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(192, 38, 211, 0.25);
            margin-bottom: 20px;
        }
        
        h2 {
            font-size: clamp(22px, 6vw, 28px);
            margin: 0 0 16px 0;
            line-height: 1.3;
        }
        
        .description {
            font-size: clamp(15px, 4vw, 17px);
            color: #d1d5db;
            line-height: 1.6;
        }
        
        button {
            width: 100%;
            max-width: 320px;
            margin-top: 20px;
            background: linear-gradient(90deg, var(--accent), #7e22ce);
            color: white;
            border: none;
            padding: 16px 24px;
            font-size: clamp(16px, 4.5vw, 18px);
            font-weight: 700;
            border-radius: 9999px;
            cursor: pointer;
            transition: transform 0.2s ease;
            box-shadow: 0 8px 25px rgba(192, 38, 211, 0.3);
        }
        
        button:active {
            transform: scale(0.97);
        }
        
        .status-red { 
            color: #ef4444; 
            font-size: clamp(20px, 5.5vw, 24px); 
            font-weight: 700; 
        }
        
        .status-green { 
            color: #22c55e; 
            font-size: clamp(20px, 5.5vw, 24px); 
            font-weight: 700; 
        }
        
        .user-name {
            color: #e879f9;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- Страница 1 -->
    <div id="page1" class="page active">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">твой путь к успеху</p>

        <div class="card">
            <h2>Приветствую вас, <span class="user-name" id="username"></span></h2>
            <p class="description">Premium Product Lollipop.cc</p>
        </div>

        <button onclick="switchPage('page2')">ПРОВЕРИТЬ ПОДПИСКУ →</button>
    </div>

    <!-- Страница 2 -->
    <div id="page2" class="page">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">твой путь к успеху</p>

        <div class="card" id="subscriptionCard"></div>

        <button onclick="switchPage('page1')">← НАЗАД</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe.user;
        let currentUsername = '';
        
        if (user) {
            currentUsername = user.username ? user.username.toLowerCase() : '';
            document.getElementById('username').textContent = 
                user.username ? '@' + user.username : (user.first_name || 'Геймер');
        }

        const premiumUsers = ['wellsecurity', 'exesvater'];

        function switchPage(targetId) {
            const pages = document.querySelectorAll('.page');
            
            pages.forEach(page => {
                if (page.id === targetId) {
                    page.style.transition = 'none';
                    page.style.opacity = '0';
                    page.style.transform = (targetId === 'page2') ? 'translateX(40px)' : 'translateX(-40px)';
                    
                    page.offsetHeight;
                    
                    page.style.transition = 'opacity 0.5s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
                    page.style.opacity = '1';
                    page.style.transform = 'translateX(0)';
                    page.classList.add('active');
                    
                    if (targetId === 'page2') {
                        const card = document.getElementById('subscriptionCard');
                        
                        if (premiumUsers.includes(currentUsername)) {
                            card.innerHTML = `
                                <h2 style="margin:0 0 20px 0;">Статус подписки</h2>
                                <p class="status-green">✅ ПОДПИСКА ДЕЙСТВУЕТ</p>
                                <p style="color:#86efac; margin-top:15px; font-size:15px;">У вас полный доступ ко всем функциям</p>
                            `;
                        } else {
                            card.innerHTML = `
                                <h2 style="margin:0 0 20px 0;">Статус подписки</h2>
                                <p class="status-red">❌ ПОДПИСКА ОТСУТСТВУЕТ</p>
                                <p style="color:#fca5a5; margin-top:15px; font-size:15px;">Оформите подписку для полного доступа</p>
                            `;
                        }
                    }
                } else {
                    page.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                    page.style.opacity = '0';
                    page.style.transform = (page.id === 'page1') ? 'translateX(-40px)' : 'translateX(40px)';
                    
                    setTimeout(() => {
                        page.classList.remove('active');
                    }, 400);
                }
            });
        }
    </script>
</body>
</html>
