<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lollipop.cc</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            --accent: #c026d3;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
            background: #07050f;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        .bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(192, 38, 211, 0.25), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(168, 85, 247, 0.15), transparent),
                #07050f;
            z-index: -2;
        }
        
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            background: rgba(192, 38, 211, 0.55);
            border-radius: 50%;
            animation: floatParticle linear infinite;
            box-shadow: 0 0 8px rgba(192, 38, 211, 0.6);
        }
        
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            15% { opacity: 0.7; }
            85% { opacity: 0.7; }
            100% { transform: translateY(-80px) scale(0.3); opacity: 0; }
        }
        
        .user-badge {
            position: fixed;
            top: 14px;
            right: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(20, 15, 35, 0.75);
            padding: 5px 12px 5px 5px;
            border-radius: 40px;
            backdrop-filter: blur(16px);
            z-index: 100;
            border: 1px solid rgba(192, 38, 211, 0.25);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
        }
        
        .user-badge img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #c026d3;
        }
        
        .user-badge .name {
            font-size: 12.5px;
            font-weight: 600;
            color: #e9d5ff;
            max-width: 100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(25, 18, 45, 0.95);
            color: white;
            padding: 13px 22px;
            border-radius: 16px;
            font-size: 13.5px;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 12px 40px rgba(0,0,0,0.45);
            border: 1px solid rgba(192, 38, 211, 0.35);
            max-width: 88%;
            text-align: center;
            backdrop-filter: blur(12px);
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .loader {
            position: fixed;
            inset: 0;
            background: rgba(7, 5, 15, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
        }
        
        .loader.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(192, 38, 211, 0.15);
            border-top-color: #c026d3;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .page {
            position: absolute;
            inset: 0;
            padding: 68px 16px 24px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            transform: translateX(36px) scale(0.97);
            transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
            overflow-y: auto;
        }
        
        .page.active {
            display: flex;
            opacity: 1;
            transform: translateX(0) scale(1);
        }
        
        .logo {
            font-size: clamp(32px, 8vw, 44px);
            font-weight: 900;
            background: linear-gradient(90deg, #ff69b4, #c026d3, #a855f7, #ff69b4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2px;
            animation: gentleFlow 12s ease infinite;
            letter-spacing: -0.5px;
        }
        
        @keyframes gentleFlow {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            color: #a1a1aa;
            font-size: clamp(13px, 3.5vw, 15.5px);
            margin-bottom: 28px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        .card {
            background: rgba(25, 18, 45, 0.7);
            border-radius: 22px;
            padding: 24px 20px;
            width: 100%;
            max-width: 330px;
            border: 1px solid rgba(192, 38, 211, 0.18);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            margin-bottom: 18px;
            backdrop-filter: blur(20px);
            text-align: left;
            opacity: 0;
            transform: translateY(18px) scale(0.97);
            animation: cardIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        
        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        h2 {
            font-size: clamp(18px, 4.8vw, 22px);
            margin: 0 0 14px 0;
            line-height: 1.3;
            font-weight: 700;
            text-align: center;
            color: #f5f3ff;
        }
        
        .status {
            font-size: clamp(14px, 3.8vw, 16.5px);
            font-weight: 800;
            margin: 6px 0 18px;
            padding: 12px 16px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            letter-spacing: 0.4px;
            width: 100%;
        }
        
        .status-green {
            background: linear-gradient(135deg, #15803d, #22c55e);
            color: white;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.35);
        }
        
        .status-red {
            background: linear-gradient(135deg, #991b1b, #ef4444);
            color: white;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.35);
        }
        
        .stat {
            margin: 10px 0;
            font-size: clamp(13px, 3.4vw, 14.5px);
            display: flex;
            justify-content: space-between;
        }
        
        .label {
            color: #a1a1aa;
            font-weight: 500;
        }
        
        .value {
            color: #f5f3ff;
            font-weight: 600;
        }
        
        button {
            width: 100%;
            max-width: 310px;
            background: linear-gradient(135deg, #c026d3, #7e22ce);
            color: white;
            border: none;
            padding: 15px 22px;
            font-size: clamp(14.5px, 3.8vw, 16px);
            font-weight: 600;
            letter-spacing: 0.4px;
            border-radius: 9999px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 8px 28px rgba(192, 38, 211, 0.4);
            margin-top: 8px;
        }
        
        button:active {
            transform: scale(0.96);
            box-shadow: 0 4px 16px rgba(192, 38, 211, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #3f3f46, #52525b);
            box-shadow: 0 6px 18px rgba(0,0,0,0.35);
        }
        
        .btn-share {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
        }
        
        .admin-stats .stat {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .premium-list {
            margin-top: 16px;
            font-size: 13.5px;
            color: #d4d4d8;
        }
        
        .premium-list div {
            padding: 5px 0;
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    
    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>
    
    <div class="toast" id="toast"></div>

    <div class="user-badge">
        <img id="userAvatar" src="" alt="" style="display:none;">
        <div class="name" id="userBadgeName">@user</div>
    </div>

    <!-- Страница 1 -->
    <div id="page1" class="page active">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">твой путь к успеху</p>

        <div class="card">
            <h2>Приветствую вас, <span id="username" style="color:#e879f9;"></span></h2>
            <p style="color:#a1a1aa; text-align:center; margin-top:8px; font-size:13.5px;">Premium Product Lollipop.cc</p>
        </div>

        <button onclick="switchPage('page2')">ПРОВЕРИТЬ ПОДПИСКУ →</button>
        <button class="btn-share" onclick="shareApp()">↗ Поделиться</button>
    </div>

    <!-- Страница 2 -->
    <div id="page2" class="page">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">твой путь к успеху</p>

        <div class="card" id="subscriptionCard"></div>

        <button onclick="switchPage('page1', true)">← НАЗАД</button>
    </div>

    <!-- Страница 3 -->
    <div id="page3" class="page">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">Админ-панель</p>

        <div class="card">
            <h2>Статистика</h2>
            
            <div class="admin-stats">
                <div class="stat">
                    <span class="label">Пользователей</span>
                    <span class="value" id="totalUsers">—</span>
                </div>
                <div class="stat">
                    <span class="label">Всего подписок</span>
                    <span class="value">2</span>
                </div>
                <div class="stat">
                    <span class="label">Админы</span>
                    <span class="value">2</span>
                </div>
            </div>

            <div class="premium-list">
                <b style="color:#e879f9;">Активные подписки</b>
                <div>✅ @wellsecurity (Admin)</div>
                <div>✅ @exesvater (Admin)</div>
            </div>
        </div>

        <button class="btn-secondary" onclick="switchPage('page2', true)">← НАЗАД</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ===== СЧЁТЧИК УНИКАЛЬНЫХ ПОЛЬЗОВАТЕЛЕЙ =====
        const COUNTER_KEY = 'lollipop_users_v2';

        async function trackUniqueUser() {
            const user = tg.initDataUnsafe.user;
            if (!user || !user.id) return;

            const userId = String(user.id);
            const visitedKey = 'visited_' + userId;

            // Уже заходил с этого устройства?
            if (localStorage.getItem(visitedKey)) {
                return;
            }

            try {
                // Увеличиваем счётчик
                const response = await fetch(`https://api.countapi.xyz/hit/lollipopcc/${COUNTER_KEY}`);
                const data = await response.json();
                
                if (data && data.value) {
                    localStorage.setItem(visitedKey, '1');
                    console.log('Новый пользователь засчитан:', data.value);
                }
            } catch (err) {
                console.error('Ошибка счётчика:', err);
            }
        }

        async function getUniqueUsersCount() {
            try {
                const response = await fetch(`https://api.countapi.xyz/get/lollipopcc/${COUNTER_KEY}`);
                const data = await response.json();
                return data.value || 0;
            } catch (err) {
                console.error('Не удалось получить счётчик');
                return 0;
            }
        }

        // Запускаем
        trackUniqueUser();

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 22; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = p.style.height = Math.random() * 3 + 1.2 + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 14 + 10) + 's';
                p.style.animationDelay = '-' + Math.random() * 15 + 's';
                p.style.opacity = Math.random() * 0.5 + 0.2;
                container.appendChild(p);
            }
        }

        function showToast(message, duration = 2600) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        function showLoader() {
            document.getElementById('loader').classList.add('show');
        }
        
        function hideLoader() {
            document.getElementById('loader').classList.remove('show');
        }

        const user = tg.initDataUnsafe.user;
        let currentUsername = '';
        
        if (user) {
            currentUsername = user.username ? user.username.toLowerCase() : '';
            
            document.getElementById('username').textContent = 
                user.username ? '@' + user.username : (user.first_name || 'Геймер');
            
            document.getElementById('userBadgeName').textContent = 
                user.username ? '@' + user.username : (user.first_name || 'User');
            
            if (user.photo_url) {
                const img = document.getElementById('userAvatar');
                img.src = user.photo_url;
                img.style.display = 'block';
            }
        }

        const premiumUsers = ['wellsecurity', 'exesvater'];
        const adminUsers = ['wellsecurity', 'exesvater'];

        function hasSubscription() {
            return premiumUsers.includes(currentUsername) || adminUsers.includes(currentUsername);
        }

        function switchPage(targetId, isBack = false) {
            showLoader();
            
            const allPages = document.querySelectorAll('.page');
            const targetPage = document.getElementById(targetId);
            
            allPages.forEach(page => {
                if (page !== targetPage) {
                    page.style.opacity = '0';
                    page.style.transform = isBack ? 'translateX(36px) scale(0.97)' : 
                        (page.id === 'page1' ? 'translateX(-36px) scale(0.97)' : 'translateX(36px) scale(0.97)');
                    
                    setTimeout(() => {
                        page.classList.remove('active');
                        page.style.display = 'none';
                    }, 480);
                }
            });
            
            setTimeout(() => {
                targetPage.style.display = 'flex';
                targetPage.classList.add('active');
                targetPage.style.opacity = '0';
                targetPage.style.transform = isBack ? 'translateX(-36px) scale(0.97)' : 
                    ((targetId === 'page2' || targetId === 'page3') ? 'translateX(36px) scale(0.97)' : 'translateX(-36px) scale(0.97)');
                
                targetPage.offsetHeight;
                
                targetPage.style.opacity = '1';
                targetPage.style.transform = 'translateX(0) scale(1)';
                
                if (targetId === 'page2') renderSubscriptionPage();
                if (targetId === 'page3') updateAdminStats();
                
                setTimeout(hideLoader, 320);
            }, 50);
        }

        async function updateAdminStats() {
            const count = await getUniqueUsersCount();
            document.getElementById('totalUsers').textContent = count;
        }

        function renderSubscriptionPage() {
            const card = document.getElementById('subscriptionCard');
            card.style.animation = 'none';
            card.offsetHeight;
            card.style.animation = 'cardIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards';
            
            const isAdmin = adminUsers.includes(currentUsername);
            const isPremium = hasSubscription();

            if (isAdmin) {
                card.innerHTML = `
                    <h2>Статус подписки</h2>
                    <div class="status status-green">✅ ПОДПИСКА ДЕЙСТВУЕТ</div>
                    <div class="stat"><span class="label">Версия</span> <span class="value">Admin Version</span></div>
                    <div class="stat"><span class="label">Статус</span> <span class="value">Навсегда</span></div>
                    <div class="stat"><span class="label">Оплачено</span> <span class="value">19.07.2026</span></div>
                    <div class="stat"><span class="label">Завершение</span> <span class="value">∞ Бессрочно</span></div>
                    <button onclick="switchPage('page3')" style="margin-top:16px;">🔧 АДМИН-ПАНЕЛЬ</button>
                `;
            } else if (isPremium) {
                card.innerHTML = `
                    <h2>Статус подписки</h2>
                    <div class="status status-green">✅ ПОДПИСКА ДЕЙСТВУЕТ</div>
                    <div class="stat"><span class="label">Версия</span> <span class="value">Premium</span></div>
                    <div class="stat"><span class="label">Статус</span> <span class="value">Активна</span></div>
                    <div class="stat"><span class="label">Оплачено</span> <span class="value">—</span></div>
                    <div class="stat"><span class="label">Завершение</span> <span class="value">—</span></div>
                `;
            } else {
                card.innerHTML = `
                    <h2>Статус подписки</h2>
                    <div class="status status-red">❌ ПОДПИСКА ОТСУТСТВУЕТ</div>
                    <div class="stat"><span class="label">Версия</span> <span class="value">—</span></div>
                    <div class="stat"><span class="label">Оплачено</span> <span class="value">—</span></div>
                    <div class="stat"><span class="label">Завершение</span> <span class="value">—</span></div>
                    <p style="color:#fca5a5; margin-top:14px; font-size:12.5px; text-align:center; line-height:1.4;">
                        Оформите подписку для доступа к премиум-функциям
                    </p>
                    <button onclick="goToPayment()" style="margin-top:14px;">💳 ОПЛАТИТЬ ПОДПИСКУ</button>
                `;
            }
        }

        function goToPayment() {
            showToast('Ссылка на оплату пока не добавлена');
        }

        function shareApp() {
            const text = 'Проверь свою подписку в Lollipop.cc 🔥';
            const url = 'https://t.me/твой_бот';
            
            if (tg.openTelegramLink) {
                tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`);
            } else {
                showToast('Ссылка скопирована');
            }
        }

        createParticles();
    </script>
</body>
</html>
