<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lollipop.cc</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #1f1b2e;
            --accent: #c026d3;
        }
        
        body {
            font-family: 'Montserrat', system-ui, sans-serif;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0033 100%);
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            padding: 40px 25px;
            max-width: 480px;
            text-align: center;
            width: 100%;
        }
        
        .logo {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #c026d3, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #b3b3b3;
            font-size: 18px;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }
        
        .card {
            background: var(--card);
            border-radius: 28px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(192, 38, 211, 0.25);
            border: 1px solid rgba(192, 38, 211, 0.2);
        }
        
        h2 {
            font-size: 29px;
            margin: 0 0 16px 0;
            line-height: 1.3;
        }
        
        .user {
            color: #e879f9;
            font-weight: 700;
        }
        
        .description {
            color: #d1d5db;
            font-size: 17.5px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">твой путь к про-геймплею</p>

        <div class="card">
            <h2>Приветствую вас, <span class="user" id="username">@username</span></h2>
            <p class="description">Premium Product Lollipop.cc</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe.user;
        const usernameEl = document.getElementById('username');
        
        if (user) {
            const displayName = user.username ? '@' + user.username : (user.first_name || 'Геймер');
            usernameEl.textContent = displayName;
        } else {
            usernameEl.textContent = 'Геймер';
        }
    </script>
</body>
</html>
