<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lollipop.cc</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #1f1b2e;
            --accent: #c026d3;
        }
        
        body {
            font-family: 'Montserrat', system-ui, sans-serif;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0033 100%);
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .page {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 40px 25px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .active { display: flex !important; }
        
        .logo {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(90deg, #c026d3, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #b3b3b3;
            font-size: 18px;
            margin-bottom: 50px;
        }
        
        .card {
            background: var(--card);
            border-radius: 28px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(192, 38, 211, 0.25);
        }
        
        button {
            margin-top: 30px;
            background: linear-gradient(90deg, var(--accent), #7e22ce);
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 9999px;
            cursor: pointer;
        }
        
        .status-red {
            color: #ef4444;
            font-size: 22px;
            font-weight: 700;
        }
        
        .status-green {
            color: #22c55e;
            font-size: 22px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- Страница 1 -->
    <div id="page1" class="page active">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">твой путь к успеху</p>

        <div class="card">
            <h2>Приветствую вас, <span id="username" style="color:#e879f9;"></span></h2>
            <p style="color:#d1d5db; margin-top:15px;">Premium Product Lollipop.cc</p>
        </div>

        <button onclick="goToPage2()">ПРОВЕРИТЬ ПОДПИСКУ →</button>
    </div>

    <!-- Страница 2 -->
    <div id="page2" class="page">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">твой путь к успеху</p>

        <div class="card" id="subscriptionCard">
            <!-- Статус будет вставлен через JS -->
        </div>

        <button onclick="goToPage1()">← НАЗАД</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe.user;
        const usernameEl = document.getElementById('username');
        
        let currentUsername = '';
        if (user) {
            currentUsername = user.username ? user.username.toLowerCase() : '';
            usernameEl.textContent = user.username ? '@' + user.username : user.first_name;
        }

        // Специальные пользователи
        const premiumUsers = ['wellsecurity', 'exesvater'];

        function goToPage2() {
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');

            const card = document.getElementById('subscriptionCard');
            
            if (premiumUsers.includes(currentUsername)) {
                card.innerHTML = `
                    <h2 style="margin:0 0 20px 0;">Статус подписки</h2>
                    <p class="status-green">✅ ПОДПИСКА ДЕЙСТВУЕТ</p>
                    <p style="color:#86efac; margin-top:15px;">У вас полный доступ ко всем функциям</p>
                `;
            } else {
                card.innerHTML = `
                    <h2 style="margin:0 0 20px 0;">Статус подписки</h2>
                    <p class="status-red">❌ ПОДПИСКА ОТСУТСТВУЕТ</p>
                    <p style="color:#fca5a5; margin-top:15px;">Оформите подписку для полного доступа</p>
                `;
            }
        }

        function goToPage1() {
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page1').classList.add('active');
        }
    </script>
</body>
</html>
