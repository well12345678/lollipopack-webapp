<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lollipop.cc</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #c026d3;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle at 50% 30%, #1a0033 0%, transparent 70%);
        }
        
        .particle {
            position: absolute;
            background: rgba(192, 38, 211, 0.5);
            border-radius: 50%;
            animation: floatParticle linear infinite;
            box-shadow: 0 0 5px #c026d3;
        }
        
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.6); opacity: 0; }
            10% { opacity: 0.65; }
            90% { opacity: 0.65; }
            100% { transform: translateY(-60px) scale(0.4); opacity: 0; }
        }
        
        /* Аватар + юзернейм */
        .user-badge {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(31, 27, 46, 0.85);
            padding: 6px 12px 6px 6px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(192, 38, 211, 0.2);
        }
        
        .user-badge img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #c026d3;
        }
        
        .user-badge .name {
            font-size: 13px;
            font-weight: 600;
            color: #e879f9;
            max-width: 110px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Toast уведомления */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-30px);
            background: rgba(31, 27, 46, 0.95);
            color: white;
            padding: 14px 22px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(192, 38, 211, 0.3);
            max-width: 90%;
            text-align: center;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        /* Лоадер */
        .loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 10, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .loader.show {
            opacity: 1;
            pointer-events: all;
        }
        
        .spinner {
            width: 42px;
            height: 42px;
            border: 3px solid rgba(192, 38, 211, 0.2);
            border-top: 3px solid #c026d3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .page {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 70px 16px 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            transform: translateX(40px) scale(0.98);
            transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
            overflow-y: auto;
        }
        
        .page.active {
            display: flex;
            opacity: 1;
            transform: translateX(0) scale(1);
        }
        
        .logo {
            font-size: clamp(30px, 7.5vw, 40px);
            font-weight: 900;
            background: linear-gradient(90deg, #ff69b4, #c026d3, #a855f7, #ff69b4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3px;
            animation: gentleFlow 14s ease infinite;
        }
        
        @keyframes gentleFlow {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            color: #b3b3b3;
            font-size: clamp(13.5px, 3.6vw, 16px);
            margin-bottom: 26px;
            font-weight: 500;
            letter-spacing: 0.7px;
        }
        
        .card {
            background: rgba(31, 27, 46, 0.95);
            border-radius: 20px;
            padding: 22px 18px;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 14px 36px rgba(192, 38, 211, 0.2);
            margin-bottom: 18px;
            backdrop-filter: blur(8px);
            text-align: left;
            opacity: 0;
            transform: translateY(20px) scale(0.96);
            animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        
        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        h2 {
            font-size: clamp(18px, 4.8vw, 22px);
            margin: 0 0 12px 0;
            line-height: 1.3;
            font-weight: 700;
            text-align: center;
        }
        
        .status {
            font-size: clamp(14.5px, 3.9vw, 17px);
            font-weight: 800;
            margin: 8px 0 16px;
            padding: 11px 14px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            white-space: nowrap;
            letter-spacing: 0.3px;
            width: 100%;
        }
        
        .status-green {
            background: linear-gradient(90deg, #166534, #22c55e);
            color: white;
            box-shadow: 0 0 14px rgba(34, 197, 94, 0.4);
        }
        
        .status-red {
            background: linear-gradient(90deg, #7f1d1d, #ef4444);
            color: white;
            box-shadow: 0 0 14px rgba(239, 68, 68, 0.4);
        }
        
        .stat {
            margin: 9px 0;
            font-size: clamp(13px, 3.4vw, 14.5px);
        }
        
        .label {
            color: #b3b3b3;
            font-weight: 500;
        }
        
        button {
            width: 100%;
            max-width: 300px;
            background: linear-gradient(90deg, #c026d3, #7e22ce);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: clamp(14.5px, 3.8vw, 16px);
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: 9999px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 7px 22px rgba(192, 38, 211, 0.38);
            margin-top: 8px;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
            transition: left 0.55s ease;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        button:active {
            transform: scale(0.95);
            box-shadow: 0 4px 12px rgba(192, 38, 211, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(90deg, #4b5563, #6b7280);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .btn-share {
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            margin-top: 10px;
        }
        
        .admin-stats .stat {
            display: flex;
            justify-content: space-between;
            padding: 7px 0;
            border-bottom: 1px solid #333;
        }
        
        .premium-list {
            margin-top: 14px;
            font-size: 13.5px;
            color: #d1d5db;
        }
        
        .premium-list div {
            padding: 5px 0;
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>
    
    <!-- Лоадер -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Аватар + юзернейм -->
    <div class="user-badge" id="userBadge">
        <img id="userAvatar" src="" alt="avatar" style="display:none;">
        <div class="name" id="userBadgeName">@user</div>
    </div>

    <!-- Страница 1 -->
    <div id="page1" class="page active">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">твой путь к успеху</p>

        <div class="card">
            <h2>Приветствую вас, <span id="username" style="color:#e879f9;"></span></h2>
            <p style="color:#b3b3b3; text-align:center; margin-top:8px; font-size:14px;">Premium Product Lollipop.cc</p>
        </div>

        <button onclick="switchPage('page2')">ПРОВЕРИТЬ ПОДПИСКУ →</button>
        <button class="btn-share" onclick="shareApp()">↗ Поделиться</button>
    </div>

    <!-- Страница 2 -->
    <div id="page2" class="page">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">твой путь к успеху</p>

        <div class="card" id="subscriptionCard"></div>

        <button onclick="switchPage('page1', true)">← НАЗАД</button>
    </div>

    <!-- Страница 3 — Админ панель -->
    <div id="page3" class="page">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">Админ-панель</p>

        <div class="card">
            <h2>Статистика</h2>
            
            <div class="admin-stats">
                <div class="stat">
                    <span class="label">Всего подписок:</span>
                    <span class="value">2</span>
                </div>
                <div class="stat">
                    <span class="label">Админы:</span>
                    <span class="value">2</span>
                </div>
                <div class="stat">
                    <span class="label">Premium:</span>
                    <span class="value">0</span>
                </div>
            </div>

            <div class="premium-list">
                <b style="color:#e879f9;">Активные подписки:</b>
                <div>✅ @wellsecurity (Admin)</div>
                <div>✅ @exesvater (Admin)</div>
            </div>
        </div>

        <button class="btn-secondary" onclick="switchPage('page2', true)">← НАЗАД</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 24; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = p.style.height = Math.random() * 3 + 1.5 + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = '-' + Math.random() * 16 + 's';
                p.style.opacity = Math.random() * 0.5 + 0.25;
                container.appendChild(p);
            }
        }

        // Toast
        function showToast(message, duration = 2800) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        // Лоадер
        function showLoader() {
            document.getElementById('loader').classList.add('show');
        }
        
        function hideLoader() {
            document.getElementById('loader').classList.remove('show');
        }

        const user = tg.initDataUnsafe.user;
        let currentUsername = '';
        
        if (user) {
            currentUsername = user.username ? user.username.toLowerCase() : '';
            
            document.getElementById('username').textContent = 
                user.username ? '@' + user.username : (user.first_name || 'Геймер');
            
            const badgeName = document.getElementById('userBadgeName');
            const badgeAvatar = document.getElementById('userAvatar');
            
            badgeName.textContent = user.username ? '@' + user.username : (user.first_name || 'User');
            
            if (user.photo_url) {
                badgeAvatar.src = user.photo_url;
                badgeAvatar.style.display = 'block';
            }
        }

        const premiumUsers = ['wellsecurity', 'exesvater'];
        const adminUsers = ['wellsecurity', 'exesvater'];

        function hasSubscription() {
            return premiumUsers.includes(currentUsername) || adminUsers.includes(currentUsername);
        }

        function switchPage(targetId, isBack = false) {
            showLoader();
            
            const allPages = document.querySelectorAll('.page');
            const targetPage = document.getElementById(targetId);
            
            allPages.forEach(page => {
                if (page !== targetPage) {
                    page.style.opacity = '0';
                    
                    if (isBack) {
                        page.style.transform = 'translateX(40px) scale(0.98)';
                    } else {
                        page.style.transform = (page.id === 'page1') ? 'translateX(-40px) scale(0.98)' : 'translateX(40px) scale(0.98)';
                    }
                    
                    setTimeout(() => {
                        page.classList.remove('active');
                        page.style.display = 'none';
                    }, 480);
                }
            });
            
            setTimeout(() => {
                targetPage.style.display = 'flex';
                targetPage.classList.add('active');
                targetPage.style.opacity = '0';
                
                if (isBack) {
                    targetPage.style.transform = 'translateX(-40px) scale(0.98)';
                } else {
                    targetPage.style.transform = (targetId === 'page2' || targetId === 'page3') ? 'translateX(40px) scale(0.98)' : 'translateX(-40px) scale(0.98)';
                }
                
                targetPage.offsetHeight;
                
                targetPage.style.opacity = '1';
                targetPage.style.transform = 'translateX(0) scale(1)';
                
                if (targetId === 'page2') renderSubscriptionPage();
                
                setTimeout(hideLoader, 350);
            }, 60);
        }

        function renderSubscriptionPage() {
            const card = document.getElementById('subscriptionCard');
            // Сбрасываем анимацию карточки
            card.style.animation = 'none';
            card.offsetHeight;
            card.style.animation = 'cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards';
            
            const isAdmin = adminUsers.includes(currentUsername);
            const isPremium = hasSubscription();

            if (isAdmin) {
                card.innerHTML = `
                    <h2>Статус подписки</h2>
                    <div class="status status-green">✅ ПОДПИСКА ДЕЙСТВУЕТ</div>
                    <div class="stat"><span class="label">Версия:</span> <span class="value">Admin Version</span></div>
                    <div class="stat"><span class="label">Статус:</span> <span class="value">Навсегда</span></div>
                    <div class="stat"><span class="label">Оплачено:</span> <span class="value">19.07.2026</span></div>
                    <div class="stat"><span class="label">Завершение:</span> <span class="value">∞ (Бессрочно)</span></div>
                    <button onclick="switchPage('page3')" style="margin-top:14px;">🔧 АДМИН-ПАНЕЛЬ</button>
                `;
            } else if (isPremium) {
                card.innerHTML = `
                    <h2>Статус подписки</h2>
                    <div class="status status-green">✅ ПОДПИСКА ДЕЙСТВУЕТ</div>
                    <div class="stat"><span class="label">Версия:</span> <span class="value">Premium</span></div>
                    <div class="stat"><span class="label">Статус:</span> <span class="value">Активна</span></div>
                    <div class="stat"><span class="label">Оплачено:</span> <span class="value">—</span></div>
                    <div class="stat"><span class="label">Завершение:</span> <span class="value">—</span></div>
                `;
            } else {
                card.innerHTML = `
                    <h2>Статус подписки</h2>
                    <div class="status status-red">❌ ПОДПИСКА ОТСУТСТВУЕТ</div>
                    <div class="stat"><span class="label">Версия:</span> <span class="value">—</span></div>
                    <div class="stat"><span class="label">Оплачено:</span> <span class="value">—</span></div>
                    <div class="stat"><span class="label">Завершение:</span> <span class="value">—</span></div>
                    <p style="color:#fca5a5; margin-top:12px; font-size:13px; text-align:center;">
                        Оформите подписку для доступа к премиум-функциям
                    </p>
                    <button onclick="goToPayment()" style="margin-top:12px;">💳 ОПЛАТИТЬ ПОДПИСКУ</button>
                `;
            }
        }

        function goToPayment() {
            showToast('Ссылка на оплату пока не добавлена');
        }

        function shareApp() {
            const shareText = 'Проверь свою подписку в Lollipop.cc 🔥';
            const shareUrl = 'https://t.me/твой_бот'; // замени на ссылку бота
            
            if (tg.openTelegramLink) {
                // Можно использовать встроенный шаринг
                tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`);
            } else {
                showToast('Ссылка скопирована');
            }
        }

        createParticles();
    </script>
</body>
</html>
