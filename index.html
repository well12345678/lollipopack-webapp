<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lollipop.cc</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #c026d3;
        }
        
        body {
            font-family: 'Montserrat', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle at 50% 30%, #1a0033 0%, transparent 70%);
        }
        
        .particle {
            position: absolute;
            background: rgba(192, 38, 211, 0.6);
            border-radius: 50%;
            animation: floatParticle linear infinite;
            box-shadow: 0 0 8px #c026d3;
        }
        
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.6); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-100px) scale(0.4); opacity: 0; }
        }
        
        .page {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            padding: 28px 22px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            transition: opacity 0.55s ease, transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(40px);
        }
        
        .page.active {
            display: flex;
            opacity: 1;
            transform: translateX(0);
        }
        
        .logo {
            font-size: clamp(36px, 8.8vw, 46px);
            font-weight: 900;
            background: linear-gradient(90deg, #ff69b4, #c026d3, #a855f7, #ff69b4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            animation: gentleFlow 14s ease infinite;
        }
        
        @keyframes gentleFlow {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            color: #b3b3b3;
            font-size: clamp(15.5px, 4vw, 18px);
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        .card {
            background: rgba(31, 27, 46, 0.95);
            border-radius: 24px;
            padding: 34px 26px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 55px rgba(192, 38, 211, 0.25);
            margin-bottom: 26px;
            backdrop-filter: blur(8px);
            text-align: left;
        }
        
        h2 {
            font-size: clamp(21px, 5.5vw, 26px);
            margin: 0 0 16px 0;
            line-height: 1.3;
            font-weight: 700;
            text-align: center;
        }
        
        .status {
            font-size: clamp(18.5px, 4.8vw, 22px);
            font-weight: 800;
            margin: 12px 0 22px;
            padding: 14px 26px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            letter-spacing: 0.6px;
        }
        
        .status-green {
            background: linear-gradient(90deg, #166534, #22c55e);
            color: white;
            box-shadow: 0 0 18px #22c55e;
        }
        
        .status-red {
            background: linear-gradient(90deg, #7f1d1d, #ef4444);
            color: white;
            box-shadow: 0 0 18px #ef4444;
        }
        
        .stat {
            margin: 13px 0;
            font-size: clamp(14.5px, 3.8vw, 15.5px);
        }
        
        .label {
            color: #b3b3b3;
            font-weight: 500;
        }
        
        button {
            width: 100%;
            max-width: 340px;
            background: linear-gradient(90deg, #c026d3, #7e22ce);
            color: white;
            border: none;
            padding: 17px 30px;
            font-size: clamp(16.5px, 4.3vw, 18px);
            font-weight: 600;
            letter-spacing: 0.8px;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0.0, 0.2, 1);
            box-shadow: 0 10px 28px rgba(192, 38, 211, 0.35);
            margin-top: 12px;
        }
        
        button:active {
            transform: scale(0.94);
            box-shadow: 0 5px 18px rgba(192, 38, 211, 0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(90deg, #4b5563, #6b7280);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: none;
            background: #2a2438;
            color: white;
            font-size: 16px;
            margin: 12px 0;
            outline: none;
        }
        
        .admin-list {
            margin-top: 20px;
            max-height: 180px;
            overflow-y: auto;
            font-size: 14px;
            color: #d1d5db;
        }
        
        .admin-list div {
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <!-- Страница 1 -->
    <div id="page1" class="page active">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">твой путь к успеху</p>

        <div class="card">
            <h2>Приветствую вас, <span id="username" style="color:#e879f9;"></span></h2>
            <p style="color:#b3b3b3; text-align:center; margin-top:10px;">Premium Product Lollipop.cc</p>
        </div>

        <button onclick="switchPage('page2')">ПРОВЕРИТЬ ПОДПИСКУ →</button>
    </div>

    <!-- Страница 2 -->
    <div id="page2" class="page">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">твой путь к успеху</p>

        <div class="card" id="subscriptionCard"></div>

        <button onclick="switchPage('page1')">← НАЗАД</button>
    </div>

    <!-- Страница 3 — Админ панель -->
    <div id="page3" class="page">
        <div class="logo">lollipop.cc</div>
        <p class="subtitle">Админ-панель</p>

        <div class="card">
            <h2>Активация подписки</h2>
            
            <input type="text" id="searchInput" placeholder="Username или Telegram ID">
            
            <button onclick="activateSubscription()">Активировать подписку</button>
            
            <div class="admin-list" id="activatedList"></div>
        </div>

        <button class="btn-secondary" onclick="switchPage('page2')">← НАЗАД</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Частицы
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 35; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = p.style.height = Math.random() * 4 + 2 + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 18 + 12) + 's';
                p.style.animationDelay = '-' + Math.random() * 20 + 's';
                p.style.opacity = Math.random() * 0.6 + 0.3;
                container.appendChild(p);
            }
        }

        const user = tg.initDataUnsafe.user;
        let currentUsername = '';
        let currentUserId = '';
        
        if (user) {
            currentUsername = user.username ? user.username.toLowerCase() : '';
            currentUserId = user.id ? String(user.id) : '';
            document.getElementById('username').textContent = 
                user.username ? '@' + user.username : (user.first_name || 'Геймер');
        }

        // Админы
        const adminUsers = ['wellsecurity', 'exesvater'];

        // Загружаем активированных пользователей из localStorage
        function getActivatedUsers() {
            const data = localStorage.getItem('activated_users');
            return data ? JSON.parse(data) : [];
        }

        function saveActivatedUsers(list) {
            localStorage.setItem('activated_users', JSON.stringify(list));
        }

        // Проверка, есть ли подписка
        function hasSubscription() {
            if (adminUsers.includes(currentUsername)) return true;
            
            const activated = getActivatedUsers();
            return activated.includes(currentUsername) || activated.includes(currentUserId);
        }

        function switchPage(targetId) {
            const allPages = document.querySelectorAll('.page');
            const targetPage = document.getElementById(targetId);
            
            allPages.forEach(page => {
                if (page !== targetPage) {
                    page.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                    page.style.opacity = '0';
                    page.style.transform = (page.id === 'page1') ? 'translateX(-40px)' : 'translateX(40px)';
                    
                    setTimeout(() => {
                        page.classList.remove('active');
                        page.style.display = 'none';
                    }, 400);
                }
            });
            
            targetPage.style.transition = 'none';
            targetPage.style.opacity = '0';
            targetPage.style.transform = (targetId === 'page2' || targetId === 'page3') ? 'translateX(40px)' : 'translateX(-40px)';
            targetPage.style.display = 'flex';
            targetPage.classList.add('active');
            
            targetPage.offsetHeight;
            
            setTimeout(() => {
                targetPage.style.transition = 'opacity 0.55s ease, transform 0.55s cubic-bezier(0.4, 0, 0.2, 1)';
                targetPage.style.opacity = '1';
                targetPage.style.transform = 'translateX(0)';
                
                if (targetId === 'page2') {
                    renderSubscriptionPage();
                }
                
                if (targetId === 'page3') {
                    renderActivatedList();
                }
            }, 30);
        }

        function renderSubscriptionPage() {
            const card = document.getElementById('subscriptionCard');
            const isAdmin = adminUsers.includes(currentUsername);
            const isPremium = hasSubscription();

            if (isAdmin) {
                card.innerHTML = `
                    <h2>Статус подписки</h2>
                    <div class="status status-green">✅ ПОДПИСКА ДЕЙСТВУЕТ</div>
                    <div class="stat"><span class="label">Версия:</span> <span class="value">Admin Version</span></div>
                    <div class="stat"><span class="label">Статус:</span> <span class="value">Навсегда</span></div>
                    <div class="stat"><span class="label">Оплачено:</span> <span class="value">19.07.2026</span></div>
                    <div class="stat"><span class="label">Завершение:</span> <span class="value">∞ (Бессрочно)</span></div>
                    <button onclick="switchPage('page3')" style="margin-top:20px;">🔧 АДМИН-ПАНЕЛЬ</button>
                `;
            } else if (isPremium) {
                card.innerHTML = `
                    <h2>Статус подписки</h2>
                    <div class="status status-green">✅ ПОДПИСКА ДЕЙСТВУЕТ</div>
                    <div class="stat"><span class="label">Версия:</span> <span class="value">Premium</span></div>
                    <div class="stat"><span class="label">Статус:</span> <span class="value">Активна</span></div>
                    <div class="stat"><span class="label">Оплачено:</span> <span class="value">—</span></div>
                    <div class="stat"><span class="label">Завершение:</span> <span class="value">—</span></div>
                `;
            } else {
                card.innerHTML = `
                    <h2>Статус подписки</h2>
                    <div class="status status-red">❌ ПОДПИСКА ОТСУТСТВУЕТ</div>
                    <div class="stat"><span class="label">Версия:</span> <span class="value">—</span></div>
                    <div class="stat"><span class="label">Оплачено:</span> <span class="value">—</span></div>
                    <div class="stat"><span class="label">Завершение:</span> <span class="value">—</span></div>
                    <p style="color:#fca5a5; margin-top:18px; font-size:14px; text-align:center;">
                        Оформите подписку для доступа к премиум-функциям
                    </p>
                    <button onclick="goToPayment()" style="margin-top:16px;">💳 ОПЛАТИТЬ ПОДПИСКУ</button>
                `;
            }
        }

        function goToPayment() {
            // Пока ссылка-заглушка. Когда дашь реальную — заменим.
            alert('Ссылка на оплату пока не добавлена.\nСкажи мне ссылку — я её вставлю.');
            // window.open('СЮДА_ССЫЛКУ', '_blank');
        }

        function activateSubscription() {
            const input = document.getElementById('searchInput').value.trim().toLowerCase().replace('@', '');
            if (!input) {
                alert('Введите username или ID');
                return;
            }

            let list = getActivatedUsers();
            if (!list.includes(input)) {
                list.push(input);
                saveActivatedUsers(list);
                alert(`Подписка активирована для: ${input}`);
            } else {
                alert('Этот пользователь уже имеет подписку');
            }

            document.getElementById('searchInput').value = '';
            renderActivatedList();
        }

        function renderActivatedList() {
            const list = getActivatedUsers();
            const container = document.getElementById('activatedList');
            
            if (list.length === 0) {
                container.innerHTML = '<div style="color:#888;">Пока никого нет</div>';
                return;
            }

            container.innerHTML = '<b>Активированные:</b><br>' + 
                list.map(u => `<div>✅ ${u}</div>`).join('');
        }

        createParticles();
    </script>
</body>
</html>
