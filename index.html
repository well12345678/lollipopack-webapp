<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lollipopack Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1c1c1c;
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 { font-size: 28px; margin-bottom: 10px; }
        p { color: #aaa; }
        button {
            margin-top: 40px;
            padding: 16px 32px;
            font-size: 18px;
            background: #229ed9;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>👋 Привет из Web App!</h1>
    <p>Telegram Mini App для @lollipopack_bot</p>
    
    <button onclick="sendToBot()">Отправить данные боту</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sendToBot() {
            const data = {
                message: "Данные из Web App",
                user: tg.initDataUnsafe.user,
                timestamp: new Date().toISOString()
            };
            tg.sendData(JSON.stringify(data));
            tg.showPopup({message: "✅ Данные отправлены боту!"});
        }
    </script>
</body>
</html>
